        // ==================================================
        // Churn Analysis Component (Cohort Dashboard)
        // ==================================================
        const ChurnAnalysis = ({ appData }) => {
            const [cohortData, setCohortData] = useState([]);
            const [metrics, setMetrics] = useState({ total: 0, expired: 0, churnRate: 0 });
            const [isLoading, setIsLoading] = useState(true);
            const [maxDisplayMonths, setMaxDisplayMonths] = useState(5);

            useEffect(() => {
                const fetchChurnData = async () => {
                    setIsLoading(true);
                    try {
                        const { data: profiles } = await supabaseClient
                            .from('profiles')
                            .select('id, fullname, subscription_plan_id, subscription_start_date, subscription_plan:subscription_plan_id(duration_days)');
                        
                        const { data: history } = await supabaseClient
                            .from('user_subscription_history')
                            .select('user_id, start_date, subscription_plan:subscription_plan_id(duration_days)');

                        let totalUsers = 0;
                        let expiredUsers = 0;
                        const now = new Date();
                        const userNamesMap = {};

                        if (profiles) {
                            profiles.forEach(p => {
                                userNamesMap[p.id] = p.fullname || 'کاربر نامشخص';
                                if (p.subscription_plan_id && p.subscription_start_date) {
                                    totalUsers++;
                                    const start = new Date(p.subscription_start_date);
                                    const duration = p.subscription_plan?.duration_days || 30;
                                    const end = new Date(start.getTime() + duration * 24 * 60 * 60 * 1000);
                                    if (end < now) {
                                        expiredUsers++;
                                    }
                                }
                            });
                        }

                        const userHistories = {};
                        if (history) {
                            history.forEach(record => {
                                if (!userHistories[record.user_id]) userHistories[record.user_id] = [];
                                const startDate = new Date(record.start_date);
                                const duration = record.subscription_plan?.duration_days || 30;
                                const endDate = new Date(startDate.getTime() + duration * 24 * 60 * 60 * 1000);
                                userHistories[record.user_id].push({ startDate, endDate });
                            });
                        }

                        const cohorts = {}; 
                        
                        const getJalaaliMonthStr = (date) => {
                            const j = jalaali.toJalaali(date.getFullYear(), date.getMonth() + 1, date.getDate());
                            return `${j.jy}-${String(j.jm).padStart(2, '0')}`;
                        };

                        const monthNames = ["فروردین", "اردیبهشت", "خرداد", "تیر", "مرداد", "شهریور", "مهر", "آبان", "آذر", "دی", "بهمن", "اسفند"];
                        const formatCohortName = (str) => {
                            const [y, m] = str.split('-');
                            return `${monthNames[parseInt(m)-1]} ${y}`;
                        };

                        Object.keys(userHistories).forEach(userId => {
                            const subs = userHistories[userId];
                            subs.sort((a, b) => a.startDate - b.startDate);
                            const firstSub = subs[0];
                            const cohortStr = getJalaaliMonthStr(firstSub.startDate);
                            
                            if (!cohorts[cohortStr]) {
                                cohorts[cohortStr] = { users: [] };
                            }
                            cohorts[cohortStr].users.push(userId);
                        });

                        const currentJ = jalaali.toJalaali(now.getFullYear(), now.getMonth() + 1, now.getDate());
                        const currentTotalMonths = currentJ.jy * 12 + currentJ.jm;

                        let maxCols = 0;
                        const sortedCohortKeys = Object.keys(cohorts).sort();
                        sortedCohortKeys.forEach(cohortStr => {
                            const [cy, cm] = cohortStr.split('-').map(Number);
                            const cohortTotalMonths = cy * 12 + cm;
                            const maxMonths = currentTotalMonths - cohortTotalMonths;
                            if (maxMonths > maxCols) maxCols = maxMonths;
                        });
                        
                        const displayColumnsCount = Math.min(Math.max(5, maxCols), 12);
                        const finalCohortData = [];

                        sortedCohortKeys.forEach(cohortStr => {
                            const [cy, cm] = cohortStr.split('-').map(Number);
                            const cohortTotalMonths = cy * 12 + cm;
                            const maxMonths = currentTotalMonths - cohortTotalMonths;

                            const usersInCohort = cohorts[cohortStr].users;
                            const retention = [];

                            for (let i = 0; i <= Math.min(maxMonths, displayColumnsCount); i++) {
                                if (i === 0) {
                                    retention.push({
                                        percentage: 100,
                                        activeUsers: usersInCohort.map(id => userNamesMap[id] || 'کاربر نامشخص')
                                    });
                                    continue;
                                }
                                
                                const targetTotalMonths = cohortTotalMonths + i;
                                const targetJy = Math.floor((targetTotalMonths - 1) / 12);
                                const targetJm = ((targetTotalMonths - 1) % 12) + 1;
                                
                                const { gy: sy, gm: sm, gd: sd } = jalaali.toGregorian(targetJy, targetJm, 1);
                                const targetStart = new Date(sy, sm - 1, sd);
                                
                                let endDay = targetJm <= 6 ? 31 : (targetJm === 12 ? 29 : 30);
                                const { gy: ey, gm: em, gd: ed } = jalaali.toGregorian(targetJy, targetJm, endDay);
                                const targetEnd = new Date(ey, em - 1, ed, 23, 59, 59);

                                let activeCount = 0;
                                let activeUsersList = [];

                                usersInCohort.forEach(userId => {
                                    const subs = userHistories[userId];
                                    const isActive = subs.some(sub => {
                                        return sub.startDate <= targetEnd && sub.endDate >= targetStart; 
                                    });
                                    if (isActive) {
                                        activeCount++;
                                        activeUsersList.push(userNamesMap[userId] || 'کاربر نامشخص');
                                    }
                                });

                                retention.push({
                                    percentage: Math.round((activeCount / usersInCohort.length) * 100),
                                    activeUsers: activeUsersList
                                });
                            }

                            while (retention.length <= displayColumnsCount) {
                                retention.push(null);
                            }

                            finalCohortData.push({
                                month: formatCohortName(cohortStr),
                                newUsers: usersInCohort.length,
                                retention: retention
                            });
                        });

                        let sumM1 = 0, countM1 = 0;
                        finalCohortData.forEach(c => {
                            if (c.retention[1] !== null) {
                                sumM1 += c.retention[1].percentage;
                                countM1++;
                            }
                        });
                        const avgRetM1 = countM1 > 0 ? (sumM1 / countM1) : 100;
                        const avgChurn = countM1 > 0 ? (100 - avgRetM1).toFixed(1) : 0;

                        setMaxDisplayMonths(displayColumnsCount);
                        setCohortData(finalCohortData.reverse()); 
                        setMetrics({ total: totalUsers, expired: expiredUsers, churnRate: avgChurn });
                    } catch (e) {
                        console.error("Error calculating churn data:", e);
                    }
                    setIsLoading(false);
                };

                fetchChurnData();
            }, []);

            const getColorOpacity = (percentage) => {
                if (percentage === null || percentage === undefined) return 'bg-gray-50 dark:bg-gray-800 text-transparent';
                if (percentage === 100) return 'bg-indigo-100 dark:bg-indigo-900/40 text-indigo-800 dark:text-indigo-200';
                if (percentage >= 85) return 'bg-indigo-200 dark:bg-indigo-800/60 text-indigo-900 dark:text-white';
                if (percentage >= 70) return 'bg-indigo-300 dark:bg-indigo-700/80 text-indigo-900 dark:text-white';
                if (percentage >= 50) return 'bg-indigo-400 dark:bg-indigo-600 text-white';
                return 'bg-indigo-500 dark:bg-indigo-500 text-white';
            };

            return (

                    {/* Summary Metric Cards */}

                        </div>
                        <div className="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 flex flex-col items-center justify-center">

                                <i className="fa-solid fa-user-minus"></i>
                            </div>
                            <p className="text-gray-500 dark:text-gray-400 text-sm mb-1">اشتراک‌های منقضی شده</p>
                            <h3 className="text-3xl font-bold text-gray-900 dark:text-white">{metrics.expired}</h3>

                    {/* Standard Cohort Analysis Table */}
                    <div className="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">

                            </div>
                        </div>
                        <div className="overflow-x-auto p-6 pb-24">
                            {cohortData.length === 0 && !isLoading ? (
                                <div className="text-center py-10 text-gray-500 dark:text-gray-400">
                                    داده‌ای برای نمایش کوهورت وجود ندارد. لطفاً ابتدا به کاربرانی اشتراک اختصاص دهید.
                                </div>
                            ) : (
                                <table className="w-full text-sm text-center text-gray-500 dark:text-gray-400 border-separate border-spacing-1">
                                    <thead>
                                        <tr>

                                                            {val !== null ? `${val.percentage}%` : ''}
                                                        </div>
                                                        {val !== null && val.activeUsers && val.activeUsers.length > 0 && (
                                                            <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-1 hidden group-hover:flex flex-col z-[100] w-48 bg-gray-800 dark:bg-gray-900 text-white text-xs rounded-lg shadow-xl border border-gray-700 pointer-events-none">
                                                                <div className="text-center font-bold px-2 py-1.5 border-b border-gray-700 text-gray-200 bg-gray-900/50 rounded-t-lg">
                                                                    مشتریان فعال ({val.activeUsers.length} نفر)
                                                                </div>
                                                                <div className="p-2 max-h-32 overflow-y-auto custom-scrollbar flex flex-col gap-1">
                                                                    {val.activeUsers.map((name, idx) => (
                                                                        <span key={idx} className="text-right truncate">• {name}</span>
                                                                    ))}
                                                                </div>
                                                                <div className="absolute top-full left-1/2 -translate-x-1/2 border-[5px] border-transparent border-t-gray-800 dark:border-t-gray-900"></div>
                                                            </div>
                                                        )}
                                                    </td>
                                                ))}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // ==================================================
        // NEW: Subscriber Scoring (Health / RFM Model) Dashboard
        // ==================================================
        const SubscriberScoring = ({ appData }) => {
            const [scores, setScores] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [showSqlModal, setShowSqlModal] = useState(false);
            const [segmentsCount, setSegmentsCount] = useState({ power: 0, stable: 0, risk: 0, churn: 0 });

            // Calculate actual Health Score based on demands and demand invoices
            const calculateHealthScores = async () => {
                setIsLoading(true);
                try {
                    const { data: profiles } = await supabaseClient
                        .from('profiles')
                        .select('id, fullname, mobile, subscription_plan_id'); // Ensure sub plan is fetched
                        
                    // Safe fetch for demand, demandinvoice and user_subscription_history tables
                    let invoices = [];
                    let demands = [];
                    
                    const invoicesRes = await supabaseClient.from('demandinvoice').select('customeruserid, createdat, totalamount');
                    if (invoicesRes.data) invoices = invoicesRes.data;
                    
                    const demandsRes = await supabaseClient.from('demand').select('customeruserid, createdat');
                    if (demandsRes.data) demands = demandsRes.data;

                    const { data: historyRes } = await supabaseClient.from('user_subscription_history').select('user_id, start_date');
                    const subHistory = historyRes || [];

                    const now = new Date();
                    const userStats = {};

                    if (profiles) {
                        profiles.forEach(p => {
                            userStats[p.id] = {
                                fullname: p.fullname || p.mobile,
                                invoices: [],
                                demands: [],
                                subs: [],
                                totalGmv: 0,
                                isSubscriber: !!p.subscription_plan_id // Flat bonus indicator
                            };
                        });
                    }
                    
                    invoices.forEach(inv => {
                        if (userStats[inv.customeruserid]) {
                            userStats[inv.customeruserid].invoices.push(inv);
                            userStats[inv.customeruserid].totalGmv += Number(inv.totalamount || 0);
                        }
                    });
                    
                    demands.forEach(req => {
                        if (userStats[req.customeruserid]) {
                            userStats[req.customeruserid].demands.push(req);
                        }
                    });

                    subHistory.forEach(sub => {
                        if (userStats[sub.user_id]) {
                            userStats[sub.user_id].subs.push(sub);
                        }
                    });

                    // Calculate Monetary percentiles for relative scoring
                    const gmvs = Object.values(userStats)
                        .map(u => u.totalGmv)
                        .filter(g => g > 0)
                        .sort((a, b) => a - b);
                    
                    const getMScore = (gmv) => {
                        if (gmv === 0) return 1;
                        if (gmvs.length < 5) return 3; // Fallback if data is too small
                        const p20 = gmvs[Math.floor(gmvs.length * 0.2)];
                        const p40 = gmvs[Math.floor(gmvs.length * 0.4)];
                        const p60 = gmvs[Math.floor(gmvs.length * 0.6)];
                        const p80 = gmvs[Math.floor(gmvs.length * 0.8)];
                        
                        if (gmv >= p80) return 5;
                        if (gmv >= p60) return 4;
                        if (gmv >= p40) return 3;
                        if (gmv >= p20) return 2;
                        return 1;
                    };

                    const newScores = [];
                    let cPower = 0, cStable = 0, cRisk = 0, cChurn = 0;

                    Object.keys(userStats).forEach(userId => {
                        const stats = userStats[userId];
                        
                        const invoiceCount = stats.invoices.length;
                        const subCount = stats.subs.length;
                        const demandCount = stats.demands.length;

                        // Only consider users who have interacted (demands, invoices, or subscriptions)
                        if (invoiceCount === 0 && demandCount === 0 && subCount === 0) return;

                        // Frequency combines both Successful Purchases AND Subscription Renewals
                        const frequencyCount = invoiceCount + subCount;
                        
                        let fScore = frequencyCount >= 10 ? 5 : (frequencyCount >= 5 ? 4 : (frequencyCount >= 3 ? 3 : (frequencyCount >= 1 ? 2 : 1)));

                        let rScore = 1;
                        let lastDates = [];
                        
                        if (invoiceCount > 0) lastDates.push(new Date(stats.invoices.sort((a,b)=>new Date(b.createdat)-new Date(a.createdat))[0].createdat));
                        if (subCount > 0) lastDates.push(new Date(stats.subs.sort((a,b)=>new Date(b.start_date)-new Date(a.start_date))[0].start_date));
                        
                        // Only fallback to demand request date if they have NEVER purchased or subscribed
                        if (demandCount > 0 && frequencyCount === 0) {
                            lastDates.push(new Date(stats.demands.sort((a,b)=>new Date(b.createdat)-new Date(a.createdat))[0].createdat));
                        }

                        if (lastDates.length > 0) {
                            lastDates.sort((a,b) => b - a); // descending
                            const daysSince = (now - lastDates[0]) / (1000 * 60 * 60 * 24);
                            
                            // Recency scale
                            if (daysSince <= 30) rScore = 5;
                            else if (daysSince <= 60) rScore = 4;
                            else if (daysSince <= 120) rScore = 3;
                            else if (daysSince <= 180) rScore = 2;
                            else rScore = 1;
                        }

                        let mScore = getMScore(stats.totalGmv);

                        // Calculate total out of 100 based on weights (R: 30%, F: 30%, M: 30%, Active Sub: +10 flat bonus)
                        let totalScore = Math.round(((rScore * 0.3) + (fScore * 0.3) + (mScore * 0.3)) * 20); 
                        if (stats.isSubscriber) totalScore += 10;
                        if (totalScore > 100) totalScore = 100;
                        
                        let segment = '';
                        let badge = '';
                        if (totalScore >= 80) { segment = 'وفادار (Power)'; badge = 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400'; cPower++; }
                        else if (totalScore >= 60) { segment = 'با ثبات (Stable)'; badge = 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400'; cStable++; }
                        else if (totalScore >= 40) { segment = 'در معرض خطر (Risk)'; badge = 'bg-orange-100 text-orange-700 dark:bg-orange-900/30 dark:text-orange-400'; cRisk++; }
                        else { segment = 'ریزش (Churn)'; badge = 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400'; cChurn++; }

                        newScores.push({
                            id: userId,
                            fullname: stats.fullname,
                            rScore, fScore, mScore, totalScore, segment, badge,
                            historyCount: frequencyCount, // Show combined actions
                            totalGmv: stats.totalGmv,
                            isSubscriber: stats.isSubscriber
                        });
                    });

                    // Sort by highest score
                    newScores.sort((a,b) => b.totalScore - a.totalScore);
                    setScores(newScores);
                    setSegmentsCount({ power: cPower, stable: cStable, risk: cRisk, churn: cChurn });

                } catch (error) {
                    console.error("Error calculating health scores:", error);
                }
                setIsLoading(false);
            };

            useEffect(() => {
                calculateHealthScores();
            }, []);

            return (
                <div className="animate-fadeIn space-y-6 relative">
                    {isLoading && (
                        <div className="absolute inset-0 bg-white/50 dark:bg-gray-900/50 backdrop-blur-sm z-10 flex items-center justify-center rounded-xl min-h-[400px]">
                            <div className="spinner w-10 h-10 border-indigo-600"></div>
                        </div>
                    )}

                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <h1 className="text-2xl font-bold mb-2 text-gray-900 dark:text-white">ارزش‌گذاری مشتریان (Subscriber Scoring)</h1>
                            <p className="text-gray-500 dark:text-gray-400">تحلیل رفتار مشترکین بر اساس مدل ترکیبی RFM + Health Score با استفاده از تقاضاها، خریدها و تاریخچه اشتراک</p>
                        </div>
                        <button onClick={() => setShowSqlModal(true)} className="bg-gray-800 hover:bg-gray-900 dark:bg-gray-700 dark:hover:bg-gray-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2">
                            <i className="fa-solid fa-database text-yellow-400"></i>
                            ساختار دیتابیس و الگوریتم
                        </button>
                    </div>

                    {/* Segmentation Overview Cards */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div className="bg-white dark:bg-gray-800 p-5 rounded-xl border-l-4 border-green-500 shadow-sm flex flex-col">
                            <span className="text-gray-500 dark:text-gray-400 text-xs font-bold uppercase tracking-wider mb-1">Power Subscribers</span>
                            <span className="text-sm font-medium text-gray-800 dark:text-gray-200 mb-3">مشتریان وفادار و پرسود</span>
                            <div className="mt-auto flex justify-between items-end">
                                <h3 className="text-3xl font-bold text-gray-900 dark:text-white">{segmentsCount.power}</h3>
                                <i className="fa-solid fa-crown text-green-500 text-2xl opacity-80"></i>
                            </div>
                        </div>
                        <div className="bg-white dark:bg-gray-800 p-5 rounded-xl border-l-4 border-blue-500 shadow-sm flex flex-col">
                            <span className="text-gray-500 dark:text-gray-400 text-xs font-bold uppercase tracking-wider mb-1">Stable / Healthy</span>
                            <span className="text-sm font-medium text-gray-800 dark:text-gray-200 mb-3">مشتریان فعال و با ثبات</span>
                            <div className="mt-auto flex justify-between items-end">
                                <h3 className="text-3xl font-bold text-gray-900 dark:text-white">{segmentsCount.stable}</h3>
                                <i className="fa-solid fa-thumbs-up text-blue-500 text-2xl opacity-80"></i>
                            </div>
                        </div>
                        <div className="bg-white dark:bg-gray-800 p-5 rounded-xl border-l-4 border-orange-500 shadow-sm flex flex-col">
                            <span className="text-gray-500 dark:text-gray-400 text-xs font-bold uppercase tracking-wider mb-1">At Risk</span>
                            <span className="text-sm font-medium text-gray-800 dark:text-gray-200 mb-3">کاهش فعالیت (نیاز به توجه)</span>
                            <div className="mt-auto flex justify-between items-end">
                                <h3 className="text-3xl font-bold text-gray-900 dark:text-white">{segmentsCount.risk}</h3>
                                <i className="fa-solid fa-triangle-exclamation text-orange-500 text-2xl opacity-80"></i>
                            </div>
                        </div>
                        <div className="bg-white dark:bg-gray-800 p-5 rounded-xl border-l-4 border-red-500 shadow-sm flex flex-col">
                            <span className="text-gray-500 dark:text-gray-400 text-xs font-bold uppercase tracking-wider mb-1">Churn Risk</span>
                            <span className="text-sm font-medium text-gray-800 dark:text-gray-200 mb-3">احتمال بالای ریزش قطعی</span>
                            <div className="mt-auto flex justify-between items-end">
                                <h3 className="text-3xl font-bold text-gray-900 dark:text-white">{segmentsCount.churn}</h3>
                                <i className="fa-solid fa-heart-crack text-red-500 text-2xl opacity-80"></i>
                            </div>
                        </div>
                    </div>

                    {/* Detailed Scoring Table */}
                    <div className="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
                        <div className="p-5 border-b border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 flex flex-col sm:flex-row justify-between sm:items-center gap-4">
                            <h3 className="text-lg font-bold text-gray-900 dark:text-white flex items-center gap-2">
                                <i className="fa-solid fa-list-ol text-indigo-500"></i>
                                جدول ارزش‌گذاری تفکیکی
                            </h3>
                            <div className="flex gap-2 text-xs text-gray-500 bg-white dark:bg-gray-700 p-2 rounded border border-gray-200 dark:border-gray-600">
                                <span className="flex gap-1 items-center"><span className="w-2 h-2 rounded-full bg-indigo-500"></span> R: تازگی خرید/تمدید</span>
                                <span className="flex gap-1 items-center"><span className="w-2 h-2 rounded-full bg-teal-500"></span> F: دفعات خرید/تمدید</span>
                                <span className="flex gap-1 items-center"><span className="w-2 h-2 rounded-full bg-yellow-500"></span> M: حجم ارزش</span>
                            </div>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm text-right text-gray-500 dark:text-gray-400">
                                <thead className="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400 border-b border-gray-200 dark:border-gray-700">
                                    <tr>
                                        <th className="px-6 py-4">نام کاربر</th>
                                        <th className="px-6 py-4 text-center">تعداد اکشن (خرید/تمدید)</th>
                                        <th className="px-6 py-4 text-center">مجموع پرداختی (GMV)</th>
                                        <th className="px-6 py-4 text-center">Recency (از 5)</th>
                                        <th className="px-6 py-4 text-center">Frequency (از 5)</th>
                                        <th className="px-6 py-4 text-center">Monetary (از 5)</th>
                                        <th className="px-6 py-4 text-center">امتیاز کل (Score)</th>
                                        <th className="px-6 py-4">سگمنت</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {scores.length === 0 && !isLoading ? (
                                        <tr><td colSpan="8" className="text-center py-8">داده‌ای یافت نشد.</td></tr>
                                    ) : (
                                        scores.map(s => (
                                            <tr key={s.id} className="bg-white border-b dark:bg-gray-800 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                                                <td className="px-6 py-4 font-bold text-gray-900 dark:text-white flex items-center gap-2">
                                                    {s.isSubscriber && <i className="fa-solid fa-crown text-yellow-500" title="اشتراک فعال (دارای +10 امتیاز تشویقی)"></i>}
                                                    {s.fullname}
                                                </td>
                                                <td className="px-6 py-4 text-center font-mono">{s.historyCount}</td>
                                                <td className="px-6 py-4 text-center font-mono text-xs">{s.totalGmv > 0 ? Number(s.totalGmv).toLocaleString('fa-IR') : '-'}</td>
                                                <td className="px-6 py-4 text-center">
                                                    <div className="flex justify-center gap-0.5" title="فاصله زمانی از آخرین خرید یا تمدید اشتراک">
                                                        {[...Array(5)].map((_, i) => (
                                                            <div key={i} className={`w-2 h-4 rounded-sm ${i < s.rScore ? 'bg-indigo-500' : 'bg-gray-200 dark:bg-gray-600'}`}></div>
                                                        ))}
                                                    </div>
                                                </td>
                                                <td className="px-6 py-4 text-center">

{`-- 1. Create a View for User RFM Score (Orders + Subscriptions logic)
CREATE OR REPLACE VIEW user_rfm_score AS
WITH combined_actions AS (
  -- All final invoices
  SELECT customeruserid as user_id, createdat as action_date, totalamount as gmv 
  FROM demandinvoice WHERE isdeleted = false
  UNION ALL
  -- All subscription starts/renewals (Count as frequency, 0 GMV for pure RFM calc, or join plan price if available)
  SELECT user_id, start_date as action_date, 0 as gmv 
  FROM user_subscription_history
),
user_stats AS (
  SELECT 
    user_id,
    COUNT(*) as total_actions,
    MAX(action_date) as last_action_date,
    SUM(gmv) as total_gmv
  FROM combined_actions
  GROUP BY user_id
)
SELECT 
  p.id as user_id,
  p.fullname,
  COALESCE(s.total_actions, 0) as total_actions,
  s.last_action_date,
  COALESCE(s.total_gmv, 0) as total_gmv,
  p.subscription_plan_id IS NOT NULL as is_active_subscriber,
  
  -- Calculate R (Recency) Score [1-5]
  CASE 
    WHEN s.last_action_date IS NULL THEN 1
    WHEN EXTRACT(DAY FROM (NOW() - s.last_action_date)) <= 30 THEN 5
    WHEN EXTRACT(DAY FROM (NOW() - s.last_action_date)) <= 60 THEN 4
    WHEN EXTRACT(DAY FROM (NOW() - s.last_action_date)) <= 120 THEN 3
    WHEN EXTRACT(DAY FROM (NOW() - s.last_action_date)) <= 180 THEN 2
    ELSE 1 
  END as r_score,
  
  -- Calculate F (Frequency) Score [1-5]
  CASE 
    WHEN s.total_actions >= 10 THEN 5
    WHEN s.total_actions >= 5 THEN 4
    WHEN s.total_actions >= 3 THEN 3
    WHEN s.total_actions >= 1 THEN 2
    ELSE 1 
  END as f_score

FROM profiles p
LEFT JOIN user_stats s ON p.id = s.user_id;

-- 2. You can query this directly from your React app:
-- const { data } = await supabase.from('user_rfm_score').select('*');`}

                    {isLoading && (
                        <div className="absolute inset-0 bg-white/50 dark:bg-gray-800/50 backdrop-blur-sm z-10 flex items-center justify-center rounded-xl">
                            <div className="spinner w-8 h-8 border-indigo-600"></div>
                        </div>
                    )}
                    
                    {/* Categories Column */}
                    <div className="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 flex flex-col h-96">
                        <h3 className="font-bold text-lg mb-1 text-indigo-600 dark:text-indigo-400 flex items-center gap-2">
                            <i className="fa-solid fa-layer-group"></i> دسته‌بندی‌های مشمول
                        </h3>
                        <p className="text-xs text-gray-500 dark:text-gray-400 mb-4">با فعال کردن هر دسته، تمامی کالاهای آن برای کاربران اشتراکی تخفیف خواهند گرفت.</p>
                        
                        <div className="overflow-y-auto pr-1 space-y-2 flex-1 custom-scrollbar">
                            {categories.map(cat => {
                                const isSub = cat.producttypeid === subTypeId;
                                return (
                                    <div key={cat.id} className={`flex items-center justify-between p-3 rounded-lg border transition-colors ${isSub ? 'bg-indigo-50 border-indigo-200 dark:bg-indigo-900/20 dark:border-indigo-800' : 'bg-gray-50 border-transparent dark:bg-gray-700/30'}`}>
                                        <span className={`text-sm font-medium ${isSub ? 'text-indigo-700 dark:text-indigo-300' : 'text-gray-700 dark:text-gray-300'}`}>
                                            {cat.title}
                                        </span>
                                        <label className="relative inline-flex items-center cursor-pointer">
                                            <input type="checkbox" className="sr-only peer" checked={isSub} onChange={() => toggleCategory(cat)} />
                                            <div className="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-gray-700 peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:right-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-indigo-600"></div>
                                        </label>
                                    </div>
                                )
                            })}
                            {categories.length === 0 && <p className="text-center text-sm text-gray-400 mt-10">دسته‌بندی یافت نشد.</p>}
                        </div>
                    </div>

                    {/* Locations Column */}
                    <div className="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 flex flex-col h-96">
                        <h3 className="font-bold text-lg mb-1 text-teal-600 dark:text-teal-400 flex items-center gap-2">
                            <i className="fa-solid fa-warehouse"></i> درصد تخفیف انبارها
                        </h3>
                        <p className="text-xs text-gray-500 dark:text-gray-400 mb-4">انبارها از جدول Supplier Stock استخراج شده‌اند. درصد تخفیف برای کالاهای مشمول را وارد کنید.</p>
                        
                        <div className="overflow-y-auto pr-1 space-y-2 flex-1 custom-scrollbar">
                            {warehouses.map(loc => {
                                const currentVal = discountValues[loc.id] || '';
                                const hasDiscount = parseFloat(currentVal) > 0;
                                return (
                                    <div key={loc.id} className={`flex flex-col sm:flex-row sm:items-center justify-between p-3 rounded-lg border transition-colors gap-3 ${hasDiscount ? 'bg-teal-50 border-teal-200 dark:bg-teal-900/20 dark:border-teal-800' : 'bg-gray-50 border-transparent dark:bg-gray-700/30'}`}>
                                        <div className="flex-1 truncate">
                                            <span className={`text-sm font-medium flex items-center gap-2 ${hasDiscount ? 'text-teal-700 dark:text-teal-300' : 'text-gray-700 dark:text-gray-300'}`}>
                                                <span className="truncate">{loc.title || 'بدون عنوان'}</span>
                                                <span className="text-xs font-mono opacity-70 bg-gray-200 dark:bg-gray-600 px-1.5 py-0.5 rounded flex-shrink-0" dir="ltr">ID: {loc.id}</span>
                                            </span>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <div className="relative w-24">
                                                <input 
                                                    type="number" 
                                                    min="0" 
                                                    max="100"
                                                    value={currentVal} 
                                                    onChange={(e) => handleDiscountChange(loc.id, e.target.value)} 
                                                    placeholder="0"
                                                    className="w-full bg-white dark:bg-gray-600 border border-gray-300 dark:border-gray-500 text-sm rounded-lg focus:ring-teal-500 focus:border-teal-500 block p-2 text-center"
                                                    dir="ltr"
                                                />
                                                <div className="absolute inset-y-0 right-0 flex items-center pr-2 pointer-events-none text-gray-400 text-xs">%</div>
                                            </div>
                                            <button onClick={() => saveLocationDiscount(loc.id)} className="bg-teal-500 hover:bg-teal-600 text-white p-2 rounded-lg transition-colors">
                                                <i className="fa-solid fa-save"></i>
                                            </button>
                                        </div>
                                    </div>
                                )
                            })}
                            {warehouses.length === 0 && <p className="text-center text-sm text-gray-400 mt-10">انباری در سیستم ثبت نشده است.</p>}
                        </div>
                    </div>
                </div>
            );
        };

        // ==================================================
        // Subscription Settings Component
        // ==================================================
        const SubscriptionSettings = ({ appData, fetchData }) => {
            const [confirmState, setConfirmState] = useState({ isOpen: false, onConfirm: null, message: '' });

            return (
                <div className="animate-fadeIn space-y-8">
                    <div>
                        <h1 className="text-2xl font-bold mb-2 text-gray-900 dark:text-white">تنظیمات اشتراک‌ها</h1>
                        <p className="text-gray-500 dark:text-gray-400 mb-6">مدیریت طرح‌ها و تعیین مدت زمان اعتبار هر اشتراک</p>
                        
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <div className="lg:col-span-2">
                                <SubscriptionPlanManager
                                    onSave={fetchData}
                                    items={appData.subscriptionPlans}
                                    confirmModal={(config) => setConfirmState({...config, onConfirm: () => {config.onConfirm(); setConfirmState({isOpen: false})}})}
                                />
                            </div>
                        </div>
                    </div>

                    <div className="pt-2 border-t border-gray-200 dark:border-gray-700">
                        <h2 className="text-xl font-bold mb-2 text-gray-900 dark:text-white">قوانین و تخفیف‌های اشتراک</h2>
                        <p className="text-gray-500 dark:text-gray-400 mb-6">تعیین دسته‌بندی‌های مشمول و درصد تخفیف انبارها</p>
                        <SubscriptionRulesManager appData={appData} />
                    </div>

                    <ConfirmModal isOpen={confirmState.isOpen} onClose={() => setConfirmState({isOpen: false})} onConfirm={confirmState.onConfirm} title="تایید عملیات" message={confirmState.message} />
                </div>
            );
        };

        // ==================================================
        // Main App Component
        // ==================================================
        const App = () => {
            const [theme, setTheme] = useState(localStorage.getItem('theme') || 'light');
            const [currentPage, setCurrentPage] = useState('users'); // Changed default to user management
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [appData, setAppData] = useState({ roles: [], provinces: [], marketingChannels: [], shippingCompanies: [], locationAttributes: [], subscriptionPlans: [] });
            const [isLoading, setIsLoading] = useState(true);

            const fetchAppData = useCallback(async () => {
                setIsLoading(true);
                try {
                    const [rolesRes, provinceRes, channelRes, shippingRes, locAttrRes, subPlanRes] = await Promise.all([
                        supabaseClient.from('role').select('*').order('title'),
                        supabaseClient.from('province').select('*').order('title'),
                        supabaseClient.from('marketingchannel').select('*').order('title'),
                        supabaseClient.from('shippingcompany').select('*').order('title'),
                        supabaseClient.from('location_attribute_key').select('*').order('title'),
                        supabaseClient.from('subscription_plan').select('*').order('title')
                    ]);
                    
                    setAppData({
                        roles: rolesRes.data || [],
                        provinces: provinceRes.data || [],
                        marketingChannels: channelRes.data || [],
                        shippingCompanies: shippingRes.data || [],
                        locationAttributes: locAttrRes.data || [],
                        subscriptionPlans: subPlanRes.data || [] 
                    });
                } catch (error) {
                    console.error("Initial data fetch error:", error);
                }
                setIsLoading(false);
            }, []);
            
            useEffect(() => {
                fetchAppData();
            }, [fetchAppData]);

            useEffect(() => {
                const root = window.document.documentElement;
                const isDark = theme === 'dark';
                root.classList.remove(isDark ? 'light' : 'dark');
                root.classList.add(theme);
                localStorage.setItem('theme', theme);
            }, [theme]);

            const toggleTheme = () => {
                setTheme(prevTheme => prevTheme === 'light' ? 'dark' : 'light');
            };

            const renderPage = () => {
                if(isLoading) {
                    return <div className="flex items-center justify-center h-full"><div className="spinner w-10 h-10 border-indigo-500"></div></div>
                }
                switch (currentPage) {
                    case 'users': return <UserManagement appData={appData} fetchData={fetchAppData} />;
                    case 'subscriptions': return <SubscriptionSettings appData={appData} fetchData={fetchAppData} />;
                    case 'settings': return <SettingsManagement appData={appData} fetchData={fetchAppData} />;
                    case 'churn': return <ChurnAnalysis appData={appData} />;
                    case 'scoring': return <SubscriberScoring appData={appData} />;
                    default: return <UserManagement appData={appData} fetchData={fetchAppData} />;
                }
            };
            
            const NavItem = ({ page, icon, children }) => {
                const isActive = currentPage === page;
                return ( 
                    <li onClick={() => {setCurrentPage(page); setIsSidebarOpen(false);}} className={`flex items-center gap-3 p-3 rounded-lg cursor-pointer transition-all duration-200 ${isActive ? 'bg-indigo-600 text-white shadow-md' : 'text-gray-600 dark:text-gray-300 hover:bg-indigo-50 dark:hover:bg-gray-700'}`}>
                        <i className={`fa-solid ${icon} w-5 text-center`}></i>
                        <span className="font-medium">{children}</span>
                    </li> 
                );
            };

            const Sidebar = () => (
                <aside className={`fixed lg:relative inset-y-0 right-0 z-50 w-64 bg-white dark:bg-gray-800 border-l border-gray-200 dark:border-gray-700 transform transition-transform duration-300 ease-in-out ${isSidebarOpen ? 'translate-x-0' : 'translate-x-full'} lg:translate-x-0 flex flex-col shadow-xl lg:shadow-none`}>
                    <div className="h-16 flex items-center justify-center border-b border-gray-200 dark:border-gray-700">
                        <span className="text-xl font-black text-indigo-600 dark:text-indigo-400 flex items-center gap-2">
                            <i className="fa-solid fa-layer-group"></i>
                            Bazaario
                        </span>
                    </div>
                    <nav className="flex-1 p-4">
                        <ul className="space-y-2">
                            <NavItem page="users" icon="fa-users">مدیریت کاربران</NavItem>
                            <NavItem page="scoring" icon="fa-heart-pulse">ارزش‌گذاری مشتریان</NavItem>
                            <NavItem page="churn" icon="fa-chart-line">تحلیل ریزش (Churn)</NavItem>
                            <NavItem page="subscriptions" icon="fa-crown">تنظیمات اشتراک‌</NavItem>
                            <NavItem page="settings" icon="fa-sliders">تنظیمات فرم‌ها</NavItem>
                        </ul>
                    </nav>
                    <div className="p-4 border-t border-gray-200 dark:border-gray-700">
                        <button onClick={toggleTheme} className="w-full flex items-center justify-center gap-2 p-2 rounded-lg text-sm text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                           {theme === 'light' ? <><i className="fa-solid fa-moon"></i> حالت تاریک</> : <><i className="fa-solid fa-sun"></i> حالت روشن</>}
                        </button>
                    </div>
                </aside>
            );

            return (
                <div className="relative min-h-screen lg:flex bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 overflow-hidden">
                    {isSidebarOpen && <div className="fixed inset-0 bg-black/50 z-40 lg:hidden backdrop-blur-sm" onClick={() => setIsSidebarOpen(false)}></div>}
                    <Sidebar />
                    <div className="flex-1 flex flex-col h-screen">
                        <header className="lg:hidden flex items-center justify-between h-16 px-4 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 shadow-sm z-30">
                            <span className="text-lg font-bold text-gray-900 dark:text-white">پنل مدیریت</span>
                            <button onClick={() => setIsSidebarOpen(true)} className="text-gray-600 dark:text-gray-200 p-2 rounded-md hover:bg-gray-100 dark:hover:bg-gray-700">
                                <i className="fa-solid fa-bars text-xl"></i>
                            </button>
                        </header>
                        <main className="flex-1 p-4 sm:p-6 lg:p-8 overflow-y-auto custom-scrollbar">
                            {renderPage()}
                        </main>
                    </div>
                </div>
            );
        };

        const container = document.getElementById('root');
        // Ensure ReactDOM is available
        const root = (window.ReactDOM || ReactDOM).createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
